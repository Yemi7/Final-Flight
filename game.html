<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/game.css">
    <title>Final Flight</title>
</head>

<body>
    <div id="board">
        <div id="start">
            <h1 id="start-message">Press space to start</h1>
        </div>
        <div id="endscreen" class='hide'>
            <h1 id="gameover">You Lost</h1>
            <div id="buttons">
                <button id="restart" class="button-style">Try Again?</button>
                <button id="change-difficulty" class="button-style">Change Difficulty</button>
            </div>
        </div>
        <div id="player"></div>
        <div id="score">0</div>
        <div class="background">
            <div id="sky"></div>
            <div id="stars"></div>
            <div id="mountains"></div>
            <div id="moon"></div>
            <div id="clouds-bottom"></div>
            <div id="clouds"></div>
        </div>
    </div>
    <audio id="jumpSound" src="./resources/woosh.mp3" preload="auto"></audio>
    <audio id="gameOverSound" src="./resources/gameover.mp3" preload="auto"></audio>
</body>
<script src="./scripts/game.js"></script>

</html>
