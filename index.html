<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/start.css">
    <title>Final Flight</title>
</head>

<body>
    <div id="board">
        <div id="welcome">
            <h1 id="start-message">Final Flight</h1>
            <div id="instruction-box">
                <p id="instructions">
                    Press Spacebar to jump <br>
                    <span>Avoide the obstacles</span>
                </p>
            </div>
            <div id="difficulty-choices">
                <button id="easy" class="button">Easy</button>
                <button id="medium" class="button">Medium</button>
                <button id="hard" class="button">Hard</button>
            </div>
        </div>

        <div class="background">
            <div id="sky"></div>
            <div id="stars"></div>
            <div id="mountains"></div>
            <div id="moon"></div>
            <div id="clouds-bottom"></div>
            <div id="clouds"></div>
        </div>
    </div>
</body>
<script src="./scripts/index.js"></script>

</html>
